name: Build & Deploy Flutter Web to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate .env File
        run: |
          cat << 'EOF' > .env
          SUPABASE_URL=https://vqomspeqeyodxsrmzmkf.supabase.co
          SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxb21zcGVxZXlvZHhzcm16bWtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NTg3ODcsImV4cCI6MjA5MDMzNDc4N30.ZsHty368h25Ze24b_ekyDIvQRaEPXvT1JWtIUY7Tbmk
          GOOGLE_ANDROID_CLIENT_ID=519115337121-n0mdl674p9loc7pcup3j5fo6t1n78tq5.apps.googleusercontent.com
          GOOGLE_WEB_CLIENT_ID=519115337121-h4rqiog9eeq6csmbm840jbnfhch7tm5r.apps.googleusercontent.com
          ADMIN_USER_ID=942288eb-2609-4a89-b89a-00cb3a7bf8e5
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        id: build
        run: |
          if ! flutter build web --release --no-tree-shake-icons > build_log.txt 2>&1; then
            echo "build_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Show Build Errors
        if: failure() && steps.build.outputs.build_failed == 'true'
        run: |
          echo '### ❌ Build Failed - Error Logs:' >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          tail -n 150 build_log.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        working-directory: ./build/web
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
