name: streat_eats
description: "Streat Eats - Haldwani ka street food delivery app"
publish_to: 'none'
version: 1.1.55+66

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  shared_preferences: ^2.5.5
  provider: ^6.1.5+1
  cached_network_image: ^3.4.1
  geolocator: ^14.0.2
  image_picker: ^1.2.2
  flutter_image_compress: ^2.4.0
  audioplayers: ^6.6.0
  intl: ^0.20.2
  url_launcher: ^6.3.2
  lottie: ^3.3.3
  shimmer: ^3.0.0
  carousel_slider: ^5.1.2
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^17.2.3  # stable version
  razorpay_flutter: ^1.3.6
  flutter_dotenv: ^6.0.1
  http: ^1.6.0
  crypto: ^3.0.7
  uuid: ^4.5.3
  path: ^1.9.1
  google_sign_in: ^6.2.1   # ← yeh use karo, stable hai
  geocoding: ^3.0.0
  google_maps_flutter: ^2.10.0
  reorderable_grid_view: ^2.2.8
  fl_chart: ^0.66.2
  device_info_plus: ^10.1.0

  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0  

flutter_native_splash:
  color: "#FFF8F0"
  image: assets/icon.png
  android: true
  ios: false

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icon.png"

  
flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/images/
    - assets/lottie/
    - assets/sounds/
    - assets/fonts/
  fonts:
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700