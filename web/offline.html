<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Connection — Streat Eats</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background-color: #FFF8F0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }

    .card {
      text-align: center;
      padding: 40px 32px;
      max-width: 360px;
      width: calc(100% - 48px);
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }

    .emoji { font-size: 64px; display: block; margin-bottom: 16px; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1A1A1A;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      color: #6B7280;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .brand {
      font-size: 13px;
      color: #FF6B35;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #FF6B35;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      padding: 14px 28px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { transform: scale(0.97); background: #e05a28; }

    .dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 28px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #FFE0D0;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { background: #FFE0D0; }
      50%       { background: #FF6B35; }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">📡</span>
    <p class="brand">STREAT EATS</p>
    <h1>No Internet Connection</h1>
    <p>It looks like you're offline. Check your Wi-Fi or mobile data and try again.</p>
    <button onclick="tryReload()" id="retry-btn">
      ↺ Try Again
    </button>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    function tryReload() {
      const btn = document.getElementById('retry-btn');
      btn.textContent = 'Checking…';
      btn.disabled = true;

      // Check connectivity by fetching a tiny resource
      fetch('/manifest.json', { method: 'HEAD', cache: 'no-store' })
        .then(() => window.location.href = '/')
        .catch(() => {
          btn.textContent = '↺ Try Again';
          btn.disabled = false;
        });
    }

    // Auto-retry when connectivity is restored
    window.addEventListener('online', () => window.location.href = '/');
  </script>
</body>
</html>
